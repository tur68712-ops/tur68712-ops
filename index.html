        <title>Final Lab Report - Start Bootstrap Theme</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            /* Portfolio Intro - Enhanced with Mixed Themed Graphics */
            .portfolio-intro {
                background: linear-gradient(135deg, #f8f9fa 0%, #e8f4f8 100%);
                padding: 60px 0;
                margin: 40px 0 0 0;
                border-top: 5px solid #0085A1;
                position: relative;
                overflow: hidden;
            }
            
            /* Animated floating elements - create unique movement paths */
            
            /* Floating map icon 1 */
            .portfolio-intro::before {
                content: "🗺️";
                position: absolute;
                top: 10%;
                left: -100px;
                font-size: 80px;
                opacity: 0.12;
                animation: floatAcross1 18s linear infinite;
                z-index: 0;
            }
            
            @keyframes floatAcross1 {
                0% { 
                    transform: translateX(-100px) translateY(0px) rotate(0deg);
                    opacity: 0;
                }
                5% { opacity: 0.12; }
                95% { opacity: 0.12; }
                100% { 
                    transform: translateX(calc(100vw + 100px)) translateY(60px) rotate(180deg);
                    opacity: 0;
                }
            }
            
            /* Floating map icon 2 */
            .portfolio-intro::after {
                content: "🧭";
                position: absolute;
                bottom: 5%;
                right: -80px;
                font-size: 70px;
                opacity: 0.10;
                animation: floatAcross2 22s linear infinite;
                z-index: 0;
            }
            
            @keyframes floatAcross2 {
                0% { 
                    transform: translateX(100vw) translateY(0px) rotate(0deg);
                    opacity: 0;
                }
                5% { opacity: 0.10; }
                95% { opacity: 0.10; }
                100% { 
                    transform: translateX(-100px) translateY(-40px) rotate(-180deg);
                    opacity: 0;
                }
            }
            
            /* White space enhancement - subtle dot pattern */
            body::before {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-image: 
                    radial-gradient(circle, rgba(200, 220, 230, 0.25) 1px, transparent 1px);
                background-size: 40px 40px;
                background-attachment: fixed;
                pointer-events: none;
                z-index: -1;
            }
            
            /* Subtle gradient overlay on white sections */
            .bg-light, 
            section:not(.portfolio-intro) {
                background: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(248,250,252,0.8) 100%) !important;
                position: relative;
            }
            
            /* Accent lines in white areas */
            .page-section {
                border-left: 3px solid rgba(0, 133, 161, 0.08);
                padding-left: 20px;
            }
            
            /* Decorative corner accents for white content blocks */
            .card, [class*="card"] {
                border-top: 2px solid rgba(0, 133, 161, 0.12);
                box-shadow: 0 2px 8px rgba(0, 133, 161, 0.05);
            }
        </style>
</head>
